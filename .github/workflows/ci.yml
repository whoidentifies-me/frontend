name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate API Client
      run: npm run api:generate

    - name: Run linter
      run: npm run lint

    - name: Run CSS linter
      run: npm run lint:css

    - name: Check formatting
      run: npm run format:check

    - name: Type check
      run: npm run typecheck

    - name: Build
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: .output/
        retention-days: 7

    # Deploy SPA builds (no SSR) to static file hosts
    - name: Build SPA (Stage)
      run: npm run build:spa
      env:
        VITE_API_URL: https://api.stage.whoidentifies.me

    - name: Deploy to Dev Environment
      if: github.ref == 'refs/heads/main'
      uses: easingthemes/ssh-deploy@v5.1.0
      with:
        SSH_PRIVATE_KEY: ${{ secrets.DEV_DEPLOYMENT_SSH_KEY }}
        REMOTE_HOST: dev.whoidentifies.me
        REMOTE_USER: wim-dev-deploy
        SOURCE: .output/public/
        TARGET: ~/
        ARGS: -avz --delete

    - name: Build SPA (Demo)
      run: npm run build:spa
      env:
        VITE_API_URL: https://api.demo.whoidentifies.me
        VITE_EXPLORE_RP_IDS: 299b5ec8-23f4-445e-bdc4-ce6394d2d374,f24700d8-5974-4dee-a040-40a976bf7b88,a85db96a-461b-4b43-aba8-80a059debeae

    - name: Deploy to Demo Environment
      if: github.ref == 'refs/heads/main'
      uses: easingthemes/ssh-deploy@v5.1.0
      with:
        SSH_PRIVATE_KEY: ${{ secrets.DEV_DEPLOYMENT_SSH_KEY }}
        REMOTE_HOST: demo.whoidentifies.me
        REMOTE_USER: demo.whoidentifies.me
        SOURCE: .output/public/
        TARGET: /var/www/demo.whoidentifies.me/
        ARGS: -avz --delete
